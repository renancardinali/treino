<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treino">
<title>Treino · Renan</title>
<style>
  :root{
    --bg:#0d1117; --card:#161b22; --card2:#1c2330; --line:#2a3240;
    --txt:#e6edf3; --muted:#8b97a7; --accent:#3b82f6; --accent2:#22c55e;
    --deload:#f59e0b; --danger:#ef4444;
    --biA:#3b82f6; --biB:#a855f7; --biC:#14b8a6; --biD:#f97316; --biE:#ec4899; --biF:#84cc16;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding-bottom:130px;
    -webkit-user-select:none; user-select:none;
  }
  header{
    position:sticky; top:0; z-index:20; background:rgba(13,17,23,.92);
    backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
    padding:calc(env(safe-area-inset-top) + 10px) 14px 8px;
  }
  .h-title{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .h-title h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.2px}
  .h-sub{font-size:11px;color:var(--muted)}
  .tabs{display:flex;gap:6px;overflow-x:auto;margin-top:10px;padding-bottom:4px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    flex:0 0 auto; padding:7px 12px; border-radius:999px; font-size:13px; font-weight:600;
    background:var(--card); border:1px solid var(--line); color:var(--muted); white-space:nowrap;
  }
  .tab.active{background:var(--accent); color:#fff; border-color:var(--accent)}
  .weekbar{display:flex;gap:6px;overflow-x:auto;margin-top:8px;scrollbar-width:none}
  .weekbar::-webkit-scrollbar{display:none}
  .wk{
    flex:0 0 auto; width:40px; text-align:center; padding:6px 0; border-radius:10px;
    font-size:12px; font-weight:700; background:var(--card); border:1px solid var(--line); color:var(--muted);
    position:relative;
  }
  .wk small{display:block;font-size:9px;font-weight:600;color:var(--muted);opacity:.8}
  .wk.active{background:var(--txt);color:#0d1117;border-color:var(--txt)}
  .wk.deload{border-color:var(--deload)}
  .wk.deload.active{background:var(--deload);color:#1a1204;border-color:var(--deload)}
  .wk.deload:not(.active){color:var(--deload)}

  main{padding:12px 12px 0}
  .dayhead{display:flex;align-items:center;justify-content:space-between;margin:2px 2px 12px}
  .dayhead .name{font-size:20px;font-weight:800}
  .deload-note{
    background:rgba(245,158,11,.12); border:1px solid rgba(245,158,11,.4); color:var(--deload);
    font-size:12px; padding:8px 12px; border-radius:10px; margin-bottom:12px; font-weight:600;
  }

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px; margin-bottom:10px; position:relative;
  }
  .card.biset{border-left-width:4px}
  .card.biset[data-bi="A"]{border-left-color:var(--biA)}
  .card.biset[data-bi="B"]{border-left-color:var(--biB)}
  .card.biset[data-bi="C"]{border-left-color:var(--biC)}
  .card.biset[data-bi="D"]{border-left-color:var(--biD)}
  .card.biset[data-bi="E"]{border-left-color:var(--biE)}
  .card.biset[data-bi="F"]{border-left-color:var(--biF)}
  .card.biset.cont{margin-top:-6px;border-top-left-radius:0;border-top-right-radius:0}
  .biset-tag{
    display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;
    color:#0d1117;margin-bottom:6px;
  }
  .biset-tag.A{background:var(--biA)} .biset-tag.B{background:var(--biB)} .biset-tag.C{background:var(--biC)}
  .biset-tag.D{background:var(--biD)} .biset-tag.E{background:var(--biE)} .biset-tag.F{background:var(--biF)}
  .ex-name{font-size:15px;font-weight:700;line-height:1.25;padding-right:36px}
  .ex-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{font-size:11px;font-weight:600;padding:3px 8px;border-radius:7px;background:var(--card2);color:var(--muted)}
  .chip.sets{color:var(--txt)}
  .chip.muscle{color:#93c5fd;background:rgba(59,130,246,.12)}
  .lastweek{
    display:flex;align-items:center;gap:8px;margin-top:10px;
    background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.28);border-radius:10px;
    padding:7px 10px;font-size:12px;color:#bbf7d0;font-weight:600;
  }
  .lastweek .tagw{font-size:10px;font-weight:800;color:#0d1117;background:var(--accent2);border-radius:6px;padding:2px 6px;white-space:nowrap}
  .lastweek .vals b{color:#eafff1;font-weight:800}
  .lastweek.empty{background:var(--card2);border-color:var(--line);color:var(--muted)}
  .lastweek.empty .tagw{background:var(--muted)}
  .inputs{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:10px;align-items:end}
  .field label{display:block;font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
  .field input{
    width:100%; background:var(--card2); border:1px solid var(--line); border-radius:10px;
    color:var(--txt); font-size:18px; font-weight:700; padding:10px; text-align:center; outline:none;
    -webkit-user-select:text; user-select:text;
  }
  .field input:focus{border-color:var(--accent)}
  .field input.filled{border-color:var(--accent2)}
  .prev{font-size:10px;color:var(--muted);margin-top:3px;text-align:center;height:12px}
  .rest-btn{
    height:44px;min-width:52px;border-radius:10px;border:1px solid var(--line);background:var(--card2);
    color:var(--txt);font-size:12px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  }
  .rest-btn:active{background:var(--accent);border-color:var(--accent)}
  .rest-btn .t{font-size:14px}
  .rest-btn .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
  .rest-btn:active .l{color:#dbeafe}
  .biset-link{font-size:11px;color:var(--muted);margin-top:10px;font-weight:600}
  .biset-link b{color:var(--txt)}

  /* Timer floating bar */
  #timer{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    background:linear-gradient(180deg,rgba(22,27,34,.4),var(--card) 30%);
    border-top:1px solid var(--line);
    padding:12px 14px calc(env(safe-area-inset-bottom) + 12px);
    transform:translateY(100%); transition:transform .25s ease;
  }
  #timer.show{transform:translateY(0)}
  #timer.done{animation:flash .5s ease 3}
  @keyframes flash{50%{background:var(--accent2)}}
  .t-row{display:flex;align-items:center;gap:12px}
  .t-time{font-size:40px;font-weight:800;font-variant-numeric:tabular-nums;min-width:120px;letter-spacing:1px}
  .t-time.low{color:var(--danger)}
  .t-bar{flex:1;height:8px;background:var(--card2);border-radius:99px;overflow:hidden}
  .t-fill{height:100%;background:var(--accent);width:100%;transition:width .3s linear}
  .t-fill.low{background:var(--danger)}
  .t-ctrls{display:flex;gap:8px;margin-top:10px}
  .t-ctrls button{
    flex:1;height:46px;border-radius:12px;border:1px solid var(--line);background:var(--card2);
    color:var(--txt);font-size:15px;font-weight:700;
  }
  .t-ctrls button:active{transform:scale(.97)}
  .t-ctrls .primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .t-ctrls .close{flex:0 0 46px}
  .t-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:2px}

  .quickbar{position:fixed;left:0;right:0;bottom:0;z-index:25;display:flex;gap:8px;justify-content:center;
    padding:10px 14px calc(env(safe-area-inset-bottom) + 10px);
    background:linear-gradient(180deg,transparent,var(--bg) 40%);}
  .quickbar button{
    background:var(--card);border:1px solid var(--line);color:var(--txt);font-weight:700;font-size:14px;
    padding:12px 16px;border-radius:12px;flex:1;max-width:120px;
  }
  .quickbar button:active{background:var(--accent);border-color:var(--accent);color:#fff}

  /* Done check + resumo */
  .h-actions{display:flex;align-items:center;gap:10px}
  .resumo-btn{background:var(--card);border:1px solid var(--line);color:var(--txt);font-weight:700;font-size:12px;padding:7px 11px;border-radius:9px}
  .resumo-btn:active{background:var(--accent);border-color:var(--accent);color:#fff}
  .donebtn{border:1.5px solid var(--accent2);background:transparent;color:var(--accent2);font-weight:800;font-size:13px;padding:10px 14px;border-radius:11px;white-space:nowrap}
  .donebtn.done{background:var(--accent2);color:#062a12;border-color:var(--accent2)}
  .donebtn:active{transform:scale(.97)}
  .tab .tk{color:var(--accent2);font-weight:900}
  .tab.active .tk{color:#eafff1}
  .modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center}
  .sheet{background:var(--card);width:100%;max-width:560px;border-radius:18px 18px 0 0;border:1px solid var(--line);
    padding:16px 16px calc(env(safe-area-inset-bottom) + 20px);max-height:85vh;overflow:auto}
  .sheethead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:16px;font-weight:800}
  .sheethead button{background:var(--card2);border:1px solid var(--line);color:var(--txt);width:34px;height:34px;border-radius:9px;font-size:15px}
  .scards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .scard{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
  .scard .n{font-size:26px;font-weight:800;color:var(--accent2)}
  .scard .l{font-size:11px;color:var(--muted);font-weight:600;margin-top:3px}
  .sbreak{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:6px 2px 12px}
  .srow{display:grid;grid-template-columns:1fr auto;gap:5px 10px;align-items:center;margin-bottom:11px;font-size:13px}
  .srow.dl span{color:var(--deload)}
  .srow b{color:var(--txt);font-variant-numeric:tabular-nums}
  .sbar{grid-column:1/3;height:6px;background:var(--card2);border-radius:99px;overflow:hidden}
  .sbar i{display:block;height:100%;background:var(--accent2)}

  /* per-exercise check */
  .excheck{position:absolute;top:11px;right:11px;width:30px;height:30px;border-radius:50%;
    border:2px solid var(--line);background:var(--card2);color:var(--accent2);font-weight:900;font-size:15px;
    display:flex;align-items:center;justify-content:center;line-height:1;padding:0}
  .excheck.on{background:var(--accent2);border-color:var(--accent2);color:#062a12}
  .excheck:active{transform:scale(.9)}
  .card.exdone{opacity:.62}
  .card.exdone .ex-name{text-decoration:line-through;text-decoration-color:var(--muted)}

  /* backup */
  .sbreak2{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin:20px 2px 10px}
  .backup{display:flex;gap:8px}
  .backup button{flex:1;background:var(--card2);border:1px solid var(--line);color:var(--txt);font-weight:700;font-size:13px;padding:12px;border-radius:11px}
  .backup button:active{background:var(--accent);border-color:var(--accent);color:#fff}
  .backup-note{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.45}
  .backup-note b{color:var(--txt)}
</style>
</head>
<body>
<header>
  <div class="h-title">
    <h1 id="appTitle">Plano de Treino</h1>
    <div class="h-actions">
      <button class="resumo-btn" onclick="openSummary()">📊 Resumo</button>
      <span class="h-sub" id="saved">salvo ✓</span>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="weekbar" id="weekbar"></div>
</header>

<main>
  <div class="dayhead"><div class="name" id="dayName"></div><button id="doneBtn" class="donebtn" onclick="toggleDone()">Concluir treino do dia</button></div>
  <div id="deloadNote" class="deload-note" style="display:none">Semana de DELOAD — reduza carga e volume. Recuperação.</div>
  <div id="list"></div>
</main>

<div class="quickbar" id="quickbar">
  <button onclick="startTimer(60,'Descanso 60s')">60s</button>
  <button onclick="startTimer(90,'Descanso 90s')">90s</button>
  <button onclick="startTimer(120,'Descanso 120s')">120s</button>
</div>

<div id="summary" class="modal" onclick="if(event.target===this)closeSummary()">
  <div class="sheet">
    <div class="sheethead"><span>📊 Resumo de treinos</span><button onclick="closeSummary()">✕</button></div>
    <div id="summaryBody"></div>
  </div>
</div>

<div id="timer">
  <div class="t-label" id="tLabel">Descanso</div>
  <div class="t-row">
    <div class="t-time" id="tTime">01:00</div>
    <div class="t-bar"><div class="t-fill" id="tFill"></div></div>
  </div>
  <div class="t-ctrls">
    <button onclick="adjust(-15)">−15s</button>
    <button class="primary" id="tPause" onclick="togglePause()">Pausar</button>
    <button onclick="adjust(15)">+15s</button>
    <button class="close" onclick="stopTimer()">✕</button>
  </div>
</div>

<script>
const DATA = {"store": "treino_renan_v1", "appTitle": "Treino · Renan", "weeks": 8, "deload": [4, 8], "days": [{"title": "Dia 1 · Push", "short": "PUSH", "exercises": [{"name": "1. Supino reto com halteres (pegada livre/neutra)", "sets": "4 x 8-10", "rest": "60-75s", "restSec": 75, "muscle": "Peito", "biset": null}, {"name": "A1. Crucifixo na MÁQUINA / peck deck", "sets": "3 x 12-15", "rest": "—", "restSec": 0, "muscle": "Peito", "biset": "A"}, {"name": "A2. Supino inclinado com HALTERES", "sets": "3 x 10-12", "rest": "60s", "restSec": 60, "muscle": "Peito superior", "biset": "A"}, {"name": "B1. Desenvolvimento na MÁQUINA (neutro)", "sets": "3 x 10-12", "rest": "—", "restSec": 0, "muscle": "Ombro", "biset": "B"}, {"name": "B2. Elevação lateral com HALTERES", "sets": "3 x 12-15", "rest": "60s", "restSec": 60, "muscle": "Deltoide medial", "biset": "B"}, {"name": "C1. Tríceps corda na POLIA", "sets": "3 x 12-15", "rest": "—", "restSec": 0, "muscle": "Tríceps", "biset": "C"}, {"name": "C2. Tríceps coice com HALTER (neutro)", "sets": "3 x 12-15", "rest": "45-60s", "restSec": 60, "muscle": "Tríceps", "biset": "C"}]}, {"title": "Dia 2 · Pull", "short": "PULL", "exercises": [{"name": "1. Puxada alta pegada neutra (triângulo) c/ straps", "sets": "4 x 10-12", "rest": "60-75s", "restSec": 75, "muscle": "Dorsais", "biset": null}, {"name": "A1. Remada na MÁQUINA pegada neutra", "sets": "3 x 10-12", "rest": "—", "restSec": 0, "muscle": "Costas", "biset": "A"}, {"name": "A2. Remada unilateral com HALTER (serrote)", "sets": "3 x 10-12/lado", "rest": "60s", "restSec": 60, "muscle": "Costas", "biset": "A"}, {"name": "B1. Pullover na POLIA com corda", "sets": "3 x 12-15", "rest": "—", "restSec": 0, "muscle": "Dorsais", "biset": "B"}, {"name": "B2. Crucifixo invertido com HALTERES (banco incl.)", "sets": "3 x 15", "rest": "60s", "restSec": 60, "muscle": "Deltoide posterior", "biset": "B"}, {"name": "C1. Rosca na POLIA com corda (neutra)", "sets": "3 x 12-15", "rest": "—", "restSec": 0, "muscle": "Bíceps", "biset": "C"}, {"name": "C2. Rosca martelo com HALTERES", "sets": "3 x 10-12", "rest": "45-60s", "restSec": 60, "muscle": "Bíceps", "biset": "C"}]}, {"title": "Dia 3 · Lower A", "short": "LOWER A", "exercises": [{"name": "1. Cadeira extensora (pré-ativação)", "sets": "3 x 12-15", "rest": "60s", "restSec": 60, "muscle": "Quadríceps", "biset": null}, {"name": "2. Leg press pés largura quadril, ~90° controlado", "sets": "4 x 10-12", "rest": "75s", "restSec": 75, "muscle": "Quadríceps/glúteo", "biset": null}, {"name": "3. Hack machine, amplitude parcial confortável", "sets": "3 x 10-12", "rest": "60s", "restSec": 60, "muscle": "Quadríceps", "biset": null}, {"name": "A1. Mesa flexora deitada (MÁQUINA)", "sets": "3 x 12-15", "rest": "—", "restSec": 0, "muscle": "Posteriores", "biset": "A"}, {"name": "A2. Stiff com HALTERES (pegada neutra)", "sets": "3 x 12-15", "rest": "60s", "restSec": 60, "muscle": "Posterior/glúteo", "biset": "A"}, {"name": "4. Panturrilha em pé na máquina", "sets": "4 x 12-15", "rest": "45s", "restSec": 45, "muscle": "Panturrilha", "biset": null}]}, {"title": "Dia 4 · Upper B", "short": "UPPER B", "exercises": [{"name": "1. Desenvolvimento na máquina, pegada neutra", "sets": "4 x 10-12", "rest": "60s", "restSec": 60, "muscle": "Ombro", "biset": null}, {"name": "A1. Remada alta na POLIA c/ corda, cotovelos baixos", "sets": "3 x 12-15", "rest": "—", "restSec": 0, "muscle": "Deltoide/trapézio", "biset": "A"}, {"name": "A2. Elevação lateral com HALTERES", "sets": "4 x 12-15", "rest": "60s", "restSec": 60, "muscle": "Deltoide medial", "biset": "A"}, {"name": "B1. Supino na MÁQUINA convergente", "sets": "3 x 10-12", "rest": "—", "restSec": 0, "muscle": "Peito", "biset": "B"}, {"name": "B2. Remada unilateral com HALTER (serrote)", "sets": "3 x 10-12/lado", "rest": "60s", "restSec": 60, "muscle": "Costas", "biset": "B"}, {"name": "C1. Tríceps na POLIA (barra V/corda neutra)", "sets": "3 x 12-15", "rest": "—", "restSec": 0, "muscle": "Tríceps", "biset": "C"}, {"name": "C2. Rosca martelo com HALTERES", "sets": "3 x 12-15", "rest": "45-60s", "restSec": 60, "muscle": "Bíceps", "biset": "C"}]}, {"title": "Dia 5 · Lower B", "short": "LOWER B", "exercises": [{"name": "1. Elevação pélvica / hip thrust (máquina ou barra)", "sets": "4 x 10-12", "rest": "75s", "restSec": 75, "muscle": "Glúteo", "biset": null}, {"name": "2. Stiff/RDL com HALTERES neutro c/ straps", "sets": "3 x 10-12", "rest": "75s", "restSec": 75, "muscle": "Posterior/glúteo", "biset": null}, {"name": "3. Mesa flexora deitada", "sets": "3 x 12-15", "rest": "60s", "restSec": 60, "muscle": "Posteriores", "biset": null}, {"name": "A1. Cadeira extensora (MÁQUINA)", "sets": "3 x 15", "rest": "—", "restSec": 0, "muscle": "Quadríceps", "biset": "A"}, {"name": "A2. Panturrilha em pé com HALTERES", "sets": "3 x 15-20", "rest": "60s", "restSec": 60, "muscle": "Panturrilha", "biset": "A"}, {"name": "4. Glúteo no cabo/máquina (kickback)", "sets": "3 x 15/lado", "rest": "45s", "restSec": 45, "muscle": "Glúteo", "biset": null}, {"name": "5. Prancha + abdominal na polia c/ corda", "sets": "3x30-45s / 3x15", "rest": "45s", "restSec": 45, "muscle": "Core", "biset": null}]}]};
const STORE = DATA.store || 'treino_renan_v1';
if(DATA.appTitle){ document.getElementById('appTitle').textContent=DATA.appTitle; document.title=DATA.appTitle; }
let state = load();
let day = state.day ?? 0;
let week = state.week ?? 1;

function load(){ try{return JSON.parse(localStorage.getItem(STORE))||{}}catch(e){return {}} }
function save(){ state.day=day; state.week=week; localStorage.setItem(STORE, JSON.stringify(state)); flashSaved(); }
let savedT;
function flashSaved(){ const el=document.getElementById('saved'); el.style.opacity=1; clearTimeout(savedT); savedT=setTimeout(()=>el.style.opacity=.35,900); }

function cell(d,w,i){ return (((state.data||{})[d]||{})[w]||{})[i] || {}; }
function lastFilled(d,w,i){
  for(let x=w-1;x>=1;x--){ const c=cell(d,x,i); if(c.carga||c.reps) return {w:x,carga:c.carga,reps:c.reps}; }
  return null;
}
function isDone(d,w){ return !!(((state.done||{})[d]||{})[w]); }
function toggleDone(){
  state.done=state.done||{}; state.done[day]=state.done[day]||{};
  if(state.done[day][week]) delete state.done[day][week];
  else state.done[day][week]=Date.now();
  save(); renderTabs(); renderDoneBtn();
}
function isExDone(d,w,i){ return !!((((state.exdone||{})[d]||{})[w]||{})[i]); }
function toggleEx(i){
  state.exdone=state.exdone||{}; state.exdone[day]=state.exdone[day]||{}; state.exdone[day][week]=state.exdone[day][week]||{};
  if(state.exdone[day][week][i]) delete state.exdone[day][week][i];
  else state.exdone[day][week][i]=Date.now();
  save();
  const on=isExDone(day,week,i);
  const btn=document.querySelector('.excheck[data-i="'+i+'"]');
  if(btn){ btn.classList.toggle('on',on); btn.innerHTML=on?'✓':''; const card=btn.closest('.card'); if(card)card.classList.toggle('exdone',on); }
}
function fmtDate(ms){ return new Date(ms).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); }
function renderDoneBtn(){
  const b=document.getElementById('doneBtn'); if(!b)return;
  const done=isDone(day,week);
  b.className='donebtn'+(done?' done':'');
  b.textContent=done ? '✓ Treino feito '+fmtDate(state.done[day][week]) : 'Concluir treino do dia';
}
function openSummary(){
  const done=state.done||{}, nd=DATA.days.length;
  const now=Date.now(), wk7=now-7*864e5;
  const D=new Date(), m0=new Date(D.getFullYear(),D.getMonth(),1).getTime();
  let total=0,last7=0,month=0; const perWeek={};
  Object.keys(done).forEach(d=>Object.keys(done[d]).forEach(w=>{
    const ts=done[d][w]; total++; if(ts>=wk7)last7++; if(ts>=m0)month++;
    perWeek[w]=(perWeek[w]||0)+1;
  }));
  let cur=0; for(let i=0;i<nd;i++) if(isDone(i,week))cur++;
  let rows='';
  for(let w=1;w<=DATA.weeks;w++){
    const c=perWeek[w]||0, dl=DATA.deload.includes(w);
    rows+=`<div class="srow${dl?' dl':''}"><span>Semana ${w}${dl?' · deload':''}</span><b>${c}/${nd}</b><div class="sbar"><i style="width:${Math.round(c/nd*100)}%"></i></div></div>`;
  }
  document.getElementById('summaryBody').innerHTML=`
    <div class="scards">
      <div class="scard"><div class="n">${cur}/${nd}</div><div class="l">Semana ${week} (atual)</div></div>
      <div class="scard"><div class="n">${last7}</div><div class="l">Últimos 7 dias</div></div>
      <div class="scard"><div class="n">${month}</div><div class="l">Este mês</div></div>
      <div class="scard"><div class="n">${total}</div><div class="l">Total no ciclo</div></div>
    </div>
    <div class="sbreak">Treinos por semana do plano</div>
    ${rows}
    <div class="sbreak2">Backup dos dados</div>
    <div class="backup">
      <button onclick="exportBackup()">⬇ Exportar backup</button>
      <button onclick="document.getElementById('importFile').click()">⬆ Importar backup</button>
    </div>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importBackup(this)">
    <div class="backup-note">Seus dados ficam <b>só neste aparelho</b>. Exporte um backup de vez em quando (o arquivo vai para os Downloads) para nunca perder cargas e histórico. Para importar, escolha o arquivo salvo.</div>`;
  document.getElementById('summary').style.display='flex';
}
function closeSummary(){ document.getElementById('summary').style.display='none'; }
function exportBackup(){
  const payload={ app:STORE, exportedAt:new Date().toISOString(), state:state };
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date(), p=n=>String(n).padStart(2,'0');
  a.href=url; a.download=STORE+'_'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importBackup(input){
  const f=input.files&&input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const o=JSON.parse(r.result);
      const incoming=o&&o.state?o.state:o;
      if(!incoming||typeof incoming!=='object') throw 0;
      if(!confirm('Importar este backup? Os dados atuais deste aparelho serão substituídos.')) { input.value=''; return; }
      state=incoming;
      day=state.day??0; week=state.week??1;
      localStorage.setItem(STORE, JSON.stringify(state));
      renderAll();
      alert('Backup importado com sucesso ✓');
    }catch(e){ alert('Arquivo inválido. Escolha um backup exportado por este app.'); }
    input.value='';
  };
  r.readAsText(f);
}
function setCell(d,w,i,k,v){
  state.data=state.data||{}; state.data[d]=state.data[d]||{}; state.data[d][w]=state.data[d][w]||{};
  state.data[d][w][i]=state.data[d][w][i]||{}; state.data[d][w][i][k]=v; save();
}

function renderTabs(){
  const t=document.getElementById('tabs'); t.innerHTML='';
  DATA.days.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===day?' active':''); b.innerHTML='D'+(i+1)+' · '+(d.short||'')+(isDone(i,week)?' <span class="tk">✓</span>':'');
    b.onclick=()=>{day=i;save();renderAll();window.scrollTo(0,0)}; t.appendChild(b);
  });
}
function renderWeeks(){
  const w=document.getElementById('weekbar'); w.innerHTML='';
  for(let i=1;i<=DATA.weeks;i++){
    const dl=DATA.deload.includes(i);
    const b=document.createElement('button');
    b.className='wk'+(i===week?' active':'')+(dl?' deload':'');
    b.innerHTML=i+(dl?'<small>deload</small>':'<small>&nbsp;</small>');
    b.onclick=()=>{week=i;save();renderAll()}; w.appendChild(b);
  }
}
function renderList(){
  const d=DATA.days[day];
  document.getElementById('dayName').textContent=d.title;
  document.getElementById('deloadNote').style.display=DATA.deload.includes(week)?'block':'none';
  const list=document.getElementById('list'); list.innerHTML='';
  d.exercises.forEach((ex,i)=>{
    const prevBi=i>0?d.exercises[i-1].biset:null;
    const cont=ex.biset && ex.biset===prevBi;
    const c=cell(day,week,i);
    const exdone=isExDone(day,week,i);
    const card=document.createElement('div');
    card.className='card'+(ex.biset?' biset'+(cont?' cont':''):'')+(exdone?' exdone':'');
    if(ex.biset) card.dataset.bi=ex.biset;
    const showTag = ex.biset && !cont;
    // rest control: only if there is real rest
    const restHtml = ex.restSec>0
      ? `<button class="rest-btn" onclick="startTimer(${ex.restSec}, ${JSON.stringify(ex.name).replace(/"/g,'&quot;')})"><span class="t">⏱ ${ex.restSec}s</span><span class="l">descanso</span></button>`
      : `<button class="rest-btn" style="opacity:.5" onclick="startTimer(30,'Emenda bi-set')"><span class="t">→</span><span class="l">emenda</span></button>`;
    const nextBi = (i+1<d.exercises.length)?d.exercises[i+1].biset:null;
    const linkHtml = (ex.biset && ex.biset===nextBi)
      ? `<div class="biset-link">↳ bi-set: emenda direto no próximo (<b>sem descanso</b>)</div>` : '';
    const last=lastFilled(day,week,i);
    const lastHtml = week>1 ? (last
      ? `<div class="lastweek"><span class="tagw">SEM ${last.w}</span><span class="vals">Semana passada: <b>${last.carga||'—'} kg</b> · <b>${last.reps||'—'} reps</b></span></div>`
      : `<div class="lastweek empty"><span class="tagw">—</span><span class="vals">Sem registro anterior</span></div>`)
      : '';
    card.innerHTML = `
      <button class="excheck${exdone?' on':''}" data-i="${i}" onclick="toggleEx(${i})" aria-label="Marcar exercício">${exdone?'✓':''}</button>
      ${showTag?`<span class="biset-tag ${ex.biset}">BI-SET ${ex.biset}</span>`:''}
      <div class="ex-name">${ex.name}</div>
      <div class="ex-meta">
        <span class="chip sets">${ex.sets}</span>
        <span class="chip muscle">${ex.muscle}</span>
        <span class="chip">⏱ ${ex.rest}</span>
      </div>
      ${lastHtml}
      <div class="inputs">
        <div class="field">
          <label>Carga (kg)</label>
          <input inputmode="decimal" placeholder="${last&&last.carga?last.carga:'—'}" value="${c.carga??''}"
            oninput="onInput(${i},'carga',this)" class="${c.carga?'filled':''}">
        </div>
        <div class="field">
          <label>Reps feitas</label>
          <input inputmode="numeric" placeholder="${last&&last.reps?last.reps:'—'}" value="${c.reps??''}"
            oninput="onInput(${i},'reps',this)" class="${c.reps?'filled':''}">
        </div>
        ${restHtml}
      </div>
      ${linkHtml}
    `;
    list.appendChild(card);
  });
}
function onInput(i,k,el){
  setCell(day,week,i,k,el.value);
  el.classList.toggle('filled', !!el.value);
}
function renderAll(){ renderTabs(); renderWeeks(); renderList(); renderDoneBtn(); }

/* ---------- Rest timer ---------- */
let total=60,left=60,tick=null,paused=false,alerted=false,endAt=0;
const tEl=document.getElementById('timer');
function fmt(s){s=Math.abs(s);const m=Math.floor(s/60),ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0')}
function draw(){
  const t=document.getElementById('tTime');
  t.textContent=(left<0?'−':'')+fmt(left);
  const pct=total>0?Math.max(0,Math.min(100,left/total*100)):0;
  const fill=document.getElementById('tFill'); fill.style.width=pct+'%';
  const low=left<=10;
  fill.classList.toggle('low',low);
  t.classList.toggle('low',low);
}
function startTimer(sec,label){
  total=sec;left=sec;paused=false;alerted=false;
  tEl.dataset.label=label||'Descanso';
  document.getElementById('tLabel').textContent=label||'Descanso';
  document.getElementById('tPause').textContent='Pausar';
  tEl.classList.remove('done'); tEl.classList.add('show');
  endAt=Date.now()+sec*1000;
  draw(); clearInterval(tick);
  tick=setInterval(()=>{
    if(paused){endAt+=250;return}
    left=Math.round((endAt-Date.now())/1000);
    draw();
    if(left<=0 && !alerted){ alerted=true; alarm(); }
  },250);
  if(navigator.vibrate)navigator.vibrate(20);
}
function alarm(){
  tEl.classList.add('done');
  if(navigator.vibrate)navigator.vibrate([200,100,200,100,300]);
  beep();
  document.getElementById('tLabel').textContent='⚠ Passou do descanso';
  setTimeout(()=>tEl.classList.remove('done'),1600);
}
function togglePause(){ paused=!paused; document.getElementById('tPause').textContent=paused?'Continuar':'Pausar'; }
function adjust(d){ endAt+=d*1000; left=Math.round((endAt-Date.now())/1000); if(total>0)total=Math.max(total,left); draw(); }
function stopTimer(){ clearInterval(tick); tEl.classList.remove('show','done'); }
let actx;
function beep(){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended')actx.resume();
    [0,0.18,0.36].forEach(t=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.type='sine';o.frequency.value=880;
      o.connect(g);g.connect(actx.destination);
      const s=actx.currentTime+t;
      g.gain.setValueAtTime(0.001,s);
      g.gain.exponentialRampToValueAtTime(0.4,s+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,s+0.15);
      o.start(s);o.stop(s+0.16);
    });
  }catch(e){}
}
// unlock audio on first touch
document.addEventListener('touchstart',()=>{try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();}catch(e){}},{once:true});

renderAll();
</script>
